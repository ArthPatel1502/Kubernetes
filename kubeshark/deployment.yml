apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-deployment-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-deployment-app
  template:
    metadata:
      labels:
        app: python-deployment-app
    spec:
      containers:
      - name: python-app
        image: kubeshark:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
